project:
  name: "AutoData Agent"
  run_mode: "prototype"
  seed: 42
  output_dir: "/content/autodata_outputs"

dataset:
  name: "openlifescienceai/medmcqa"
  use_mock_data: false
  target_domains:
    - "Anatomy"
    - "Pharmacology"
    - "Pathology"
    - "Microbiology"
    - "Physiology"
  eval_samples_per_domain: 75
  train_pool_samples_per_domain: 200

models:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  generation_model: "Qwen/Qwen2.5-7B-Instruct"
  use_real_model: true
  use_vllm: false

generation:
  provider: "openai"
  use_mock_generation: false
  total_budget: 500
  samples_per_domain: 200
  max_new_tokens: 512
  api_model: "gpt-4o-mini"
  api_batch_size: 5
  api_max_output_tokens: 2400
  api_key_env: "OPENAI_API_KEY"

verification:
  near_duplicate_threshold: 0.995
  question_duplicate_threshold: 0.94
  leakage_threshold: 0.88

medical_critic:
  enabled: false
  provider: "openai"
  model: "gpt-4o-mini"
  fail_closed: true
  abort_on_error: true
  preflight_check: true
  max_new_tokens: 384

planning:
  strategy: "llm_agent"
  agent_provider: "openai"
  agent_model: "gpt-4o-mini"
  api_key_env: "OPENAI_API_KEY"
  abort_on_error: true
  min_samples_per_domain: 25

mixture:
  strategy: "agent_guided"

training:
  enabled: true
  dry_run: false
  method: "qlora"
  max_seq_length: 512
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  max_steps: 50
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
