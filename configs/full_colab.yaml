project:
  name: "AutoData Agent"
  run_mode: "full"
  seed: 42
  output_dir: "/content/autodata_outputs"

dataset:
  name: "openlifescienceai/medmcqa"
  use_mock_data: false
  target_domains:
    - "Anatomy"
    - "Pharmacology"
    - "Pathology"
    - "Microbiology"
    - "Physiology"
  eval_samples_per_domain: 250
  train_pool_samples_per_domain: 1000

models:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  generation_model: "Qwen/Qwen2.5-7B-Instruct"
  use_real_model: true
  use_vllm: false

generation:
  provider: "mock"
  use_mock_generation: true
  total_budget: 2500
  samples_per_domain: 500
  max_new_tokens: 512

planning:
  strategy: "weakness_based"
  min_samples_per_domain: 100

mixture:
  strategy: "weakness_based"

training:
  enabled: true
  dry_run: false
  method: "qlora"
  max_seq_length: 512
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 0.0002
  max_steps: 200
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
